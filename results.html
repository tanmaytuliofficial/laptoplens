<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Laptop Recommendations | LaptopLens</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/main.css">
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="logo"><span class="logo-icon">◈</span><span class="logo-text">LaptopLens</span></a>
    <div class="nav-links">
      <a href="/" onclick="history.back()">← Redo quiz</a>
    </div>
  </div>
</nav>

<div class="results-page">
  <div id="resultsHeader">
    <div class="results-title">Your top laptop picks 🎯</div>
    <p class="results-sub">Based on your answers — sorted by match score</p>
  </div>
  <div id="resultsList"></div>
  <div style="text-align:center;margin-top:40px;padding:24px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);">
    <p style="color:var(--text2);font-size:14px;margin-bottom:12px;">Not happy with these? Refine your preferences</p>
    <button class="btn-primary" onclick="window.location.href='/'">Redo quiz →</button>
    <p style="font-size:12px;color:var(--text3);margin-top:16px;">
      ⓘ LaptopLens earns a small commission from Amazon when you buy through our links — at no extra cost to you.
    </p>
    <p style="font-size:11px;color:var(--text3);margin-top:4px;">A product by <a href="https://aetherixcode.pages.dev" style="color:var(--accent)">Aetherix Group</a> · © 2026 LaptopLens</p>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);

let laptops = [];
try {
  const r = params.get('results');
  if (r) laptops = JSON.parse(r);
} catch(e) {}

if (!laptops.length) {
  const answers = JSON.parse(params.get('answers') || '{}');
  laptops = getLocalMatches(answers);
}

function getLocalMatches(a) {
  const budget = a.budget || 60000;
  const LAPTOPS = [
    { id:1, name:'ASUS Vivobook 16X', brand:'asus', price:62990, img:'https://m.media-amazon.com/images/I/71oL9PLKFWL._SL1500_.jpg', specs:['AMD Ryzen 5','16GB RAM','512GB SSD','16" FHD'], tags:['study','coding','mid','15','windows','mid','normal','16','none','college'], score:0 },
    { id:2, name:'Lenovo IdeaPad Slim 5', brand:'lenovo', price:57990, img:'https://m.media-amazon.com/images/I/61WFPU1OZKL._SL1500_.jpg', specs:['AMD Ryzen 5 7530U','16GB RAM','512GB SSD','15.6" FHD IPS'], tags:['study','coding','mid','15','windows','high','ultra','16','none','college'], score:0 },
    { id:3, name:'HP Pavilion 15', brand:'hp', price:54990, img:'https://m.media-amazon.com/images/I/61RnGqMaQEL._SL1500_.jpg', specs:['Intel Core i5-12th Gen','8GB RAM','512GB SSD','15.6" FHD'], tags:['study','business','basic','15','windows','mid','normal','8','none','college'], score:0 },
    { id:4, name:'ASUS TUF Gaming F15', brand:'asus', price:74990, img:'https://m.media-amazon.com/images/I/71vFKBpKakL._SL1500_.jpg', specs:['Intel i5-12500H','16GB RAM','512GB SSD','RTX 3050','15.6" 144Hz'], tags:['gaming','gaming','high','15','windows','low','desktop','16','heavy','college'], score:0 },
    { id:5, name:'Lenovo LOQ 15', brand:'lenovo', price:79990, img:'https://m.media-amazon.com/images/I/71r3rAPuZJL._SL1500_.jpg', specs:['AMD Ryzen 5 7300HX','16GB RAM','512GB SSD','RTX 4060','15.6" 144Hz'], tags:['gaming','gaming','high','15','windows','low','desktop','16','heavy','college'], score:0 },
    { id:6, name:'Dell Inspiron 15', brand:'dell', price:49990, img:'https://m.media-amazon.com/images/I/61eY2MmEadL._SL1500_.jpg', specs:['Intel i3-12th Gen','8GB RAM','256GB SSD','15.6" FHD'], tags:['study','business','basic','15','windows','mid','normal','8','none','school'], score:0 },
    { id:7, name:'MacBook Air M3', brand:'apple', price:114900, img:'https://m.media-amazon.com/images/I/71jG+e7roXL._SL1500_.jpg', specs:['Apple M3 chip','8GB Unified RAM','256GB SSD','13.6" Liquid Retina'], tags:['coding','design','high','13','mac','high','ultra','8','none','professional'], score:0 },
    { id:8, name:'Acer Nitro V 15', brand:'acer', price:69990, img:'https://m.media-amazon.com/images/I/71bKsGCz+QL._SL1500_.jpg', specs:['AMD Ryzen 5 7535HS','8GB RAM','512GB SSD','RTX 4050','15.6" 144Hz'], tags:['gaming','gaming','high','15','windows','low','desktop','8','heavy','college'], score:0 }
  ];

  LAPTOPS.forEach(l => {
    let s = 50;
    if (l.price <= budget) s += 20;
    else if (l.price <= budget * 1.1) s += 5;
    else s -= 20;
    if (a.usecase && l.tags.includes(a.usecase)) s += 15;
    if (a.performance && l.tags.includes(a.performance)) s += 10;
    if (a.screen && l.tags.includes(a.screen)) s += 5;
    if (a.os && l.tags.includes(a.os)) s += 10;
    if (a.gaming === 'heavy' && l.tags.includes('heavy')) s += 15;
    if (a.gaming === 'none' && !l.tags.includes('heavy')) s += 5;
    if (a.brand && a.brand.includes(l.brand)) s += 8;
    l.score = Math.min(s, 99);
  });

  return LAPTOPS.sort((a,b) => b.score - a.score).slice(0,5);
}

function render() {
  const list = document.getElementById('resultsList');
  list.innerHTML = laptops.map((l, i) => `
    <div class="laptop-card ${i===0?'top-pick':''}">
      <img class="laptop-img" src="${l.img}" alt="${l.name} laptop" loading="lazy" onerror="this.src='https://placehold.co/300x220/1a2235/638cff?text=Laptop'">
      <div class="laptop-info">
        ${i===0 ? '<span class="laptop-badge">⭐ Best Match</span>' : ''}
        <div class="laptop-name">${l.name}</div>
        <div class="laptop-score">Match score: ${l.score}%</div>
        <div class="laptop-specs">
          ${l.specs.map(s => `<span class="spec-tag">${s}</span>`).join('')}
        </div>
      </div>
      <div class="laptop-actions">
        <div class="laptop-price">₹${Number(l.price).toLocaleString('en-IN')}</div>
        <a href="${l.affiliate_url || l.amazon_url || '#'}" target="_blank" rel="noopener sponsored" class="btn-buy" onclick="trackClick(${l.id},'buy')">
          Buy on Amazon →
        </a>
        <a href="${l.amazon_url || '#'}" target="_blank" rel="noopener" style="font-size:12px;color:var(--text3);text-align:center;text-decoration:none;">View on Amazon</a>
      </div>
    </div>
  `).join('');
}

async function trackClick(laptopId, action) {
  try {
    await fetch('/api/track', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ laptopId, action, sessionId: new URLSearchParams(location.search).get('session') })
    });
  } catch(e) {}
}

render();
</script>
</body>
</html>
