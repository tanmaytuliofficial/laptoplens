<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — LaptopLens</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/main.css">
</head>
<body>
<div class="admin-login">
  <div class="admin-login-box">
    <div style="font-size:28px;margin-bottom:12px;">◈</div>
    <h1>LaptopLens Admin</h1>
    <p>Restricted access · Aetherix Group</p>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="admin@aetherix.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <p class="form-error" id="err">Invalid credentials. Try again.</p>
    <button class="btn-primary" style="width:100%;margin-top:8px;" onclick="doLogin()">Sign in →</button>
    <p class="admin-watermark">A product by Aetherix Group · © 2026</p>
  </div>
</div>
<script>
async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('err');
  errEl.style.display = 'none';
  if (!email || !password) { errEl.textContent = 'Please fill all fields.'; errEl.style.display = 'block'; return; }
  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (data.token) {
      localStorage.setItem('ll_admin_token', data.token);
      window.location.href = '/admin-dashboard.html';
    } else {
      errEl.textContent = data.message || 'Invalid credentials.';
      errEl.style.display = 'block';
    }
  } catch(e) {
    errEl.textContent = 'Server error. Try again.';
    errEl.style.display = 'block';
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
